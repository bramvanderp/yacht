type: 1
title: Pi-hole
name: pihole
description: Pi-hole Network-wide Ad Blocking. Uses host network so it can serve DNS on :53. Web UI on :8083 to avoid clashing with Caddy on :80. Requires the systemd-resolved DNS stub on the host to be disabled (see CLAUDE.md).
logo: https://pi-hole.net/wp-content/uploads/2016/12/Vortex-R.png
image: pihole/pihole:latest
categories:
- Network
platform: linux
restart_policy: unless-stopped
network_mode: host
env:
  - name: TZ
    label: Timezone
    default: Europe/Amsterdam
  - name: FTLCONF_webserver_api_password
    label: Web admin password (Pi-hole v6)
    default: '!pihole_webpassword'
  - name: FTLCONF_webserver_port
    label: Web UI port (avoid 80 — Caddy uses it)
    default: '8083'
  - name: FTLCONF_dns_listeningMode
    label: DNS listening mode
    default: 'all'
  - name: FTLCONF_dns_interface
    label: Network interface
    default: enp0s25
volumes:
  - container: /etc/pihole
    bind: /home/bram/.pihole
  - container: /etc/dnsmasq.d
    bind: /home/bram/.pihole/dnsmasq.d
cap_add:
  - NET_ADMIN
  - SYS_TIME