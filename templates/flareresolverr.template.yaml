image: ghcr.io/flaresolverr/flaresolverr:latest
categories:
- Media
platform: linux
restart_policy: unless-stopped
ports:
- 8191:8191/tcp
network_mode: bridge
env:
- name: LOG_LEVEL
  label: LOG_LEVEL
  default: 'info'
